name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      # Native FFI dependencies, resolved via pkg-config in the lakefile:
      #  - libpq   (ffi/postgres.c) for Database.PostgreSQL
      #  - OpenSSL (ffi/jose.c)     for Crypto.JOSE
      - name: Install native FFI dependencies (libpq, OpenSSL)
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libssl-dev pkg-config
      - uses: leanprover/lean-action@v1
